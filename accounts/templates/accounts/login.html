<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --surface: #1a2332;
        --border: #2d3a4d;
        --text: #e8ecf1;
        --muted: #8b9cb3;
        --accent: #5b9fd4;
        --accent-hover: #7ab3e0;
        --danger-bg: #3d2024;
        --danger-border: #8b3a42;
        --danger-text: #f5a4ad;
        --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f6f9;
          --surface: #ffffff;
          --border: #d8dee9;
          --text: #2e3440;
          --muted: #5e6a7a;
          --accent: #3b7fc4;
          --accent-hover: #2d6aa8;
          --danger-bg: #fde8e8;
          --danger-border: #e06c75;
          --danger-text: #8b1e2a;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        padding: 1.5rem;
      }

      .card {
        width: 100%;
        max-width: 380px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 2rem;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
      }

      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.35rem;
        font-weight: 600;
      }

      .subtitle {
        margin: 0 0 1.5rem;
        font-size: 0.875rem;
        color: var(--muted);
      }

      label {
        display: block;
        font-size: 0.8125rem;
        font-weight: 500;
        margin-bottom: 0.35rem;
        color: var(--muted);
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 0.65rem 0.75rem;
        margin-bottom: 1rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg);
        color: var(--text);
        font-size: 1rem;
      }

      input:focus {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      button[type="submit"] {
        width: 100%;
        margin-top: 0.25rem;
        padding: 0.7rem 1rem;
        border: none;
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      button[type="submit"]:hover {
        background: var(--accent-hover);
      }

      .btn-secondary {
        display: block;
        width: 100%;
        margin-top: 0.75rem;
        padding: 0.7rem 1rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: var(--text);
        font-size: 1rem;
        font-weight: 600;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
      }

      .btn-secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .alert-error {
        padding: 0.75rem 0.85rem;
        margin-bottom: 1rem;
        border-radius: 6px;
        background: var(--danger-bg);
        border: 1px solid var(--danger-border);
        color: var(--danger-text);
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sign in</h1>
      <p class="subtitle">Use your Django username and password.</p>

      {% if messages %}
        {% for message in messages %}
          {% if message.tags == "error" %}
            <div class="alert-error" role="alert">{{ message }}</div>
          {% endif %}
        {% endfor %}
      {% endif %}

      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          required
          autofocus
        />

        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        />

        <button type="submit">Sign in</button>
      </form>

      <a class="btn-secondary" href="{% url 'register' %}">Create account</a>
    </main>
  </body>
</html>
